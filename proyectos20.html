<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Proyectos Destacados</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/98182135?v=4">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(102,102,102,0.5);
      --accent1: #7c3aed;
      --accent2: #06b6d4;
      --shadow-strong: 0 20px 50px rgba(2,6,23,0.6);
    }
    html,body{height:100%;overflow-x:hidden;}
    body{
      font-family:'Inter','Segoe UI',sans-serif;
      color:#fff;
      -webkit-font-smoothing:antialiased;
      padding:24px 16px;
      background: #000;
      box-sizing:border-box;
      font-weight: 100;
    }

    /* ── Wrapper ── */
    .showcase-wrap{max-width:1200px;margin:0 auto;width:100%;}

    /* ── Navbar ── */
    .filter-menu{
      display:flex;flex-wrap:wrap;gap:16px;
      font-size:.9rem;font-weight:100;
      justify-content:center;align-items:center;
      color:#6b7280;position:relative;padding-bottom:4px;
    }
    .filter-menu a{color:#6b7280;text-decoration:none;transition:color .2s;}
    .filter-menu a:hover{color:#fff;}
    .indicator{position:absolute;bottom:0;height:2px;background:#fff;transition:all .3s ease;}

    /* ── Controls panel ── */
    .controls-panel{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
      justify-content:space-between;
      backdrop-filter:blur(6px);
      background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));
      border:1px solid var(--glass-border);
      padding:10px 12px;border-radius:12px;
      box-shadow:var(--shadow-strong);
      width:100%;box-sizing:border-box;
    }
    .controls-left,.controls-right{
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    }

    /* ── Device frame ── */
    .device-frame{
      border-radius:22px;overflow:hidden;
      background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));
      border:1px solid var(--glass-border);
      position:relative;
      transition:all 400ms cubic-bezier(.22,.9,.3,1);
      box-shadow:var(--shadow-strong);
      display:flex;flex-direction:column;align-items:stretch;
      width:100%;box-sizing:border-box;
    }
    .frame-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 14px;
      background:rgba(2,6,23,.6);
      border-bottom:1px solid rgba(255,255,255,.03);
      flex-wrap:wrap;gap:6px;
    }
    .frame-header-label{
      font-size:.7rem;color:#fff;
      background:rgba(255,255,255,.05);
      border-radius:99px;padding:3px 14px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      max-width:60%;
    }
    .frame-dots{display:flex;gap:7px;align-items:center;flex-shrink:0;}
    .frame-dot{width:10px;height:10px;border-radius:99px;}
    .dot-red{background:#ef4444}.dot-yellow{background:#f59e0b}.dot-green{background:#16a34a}

    /* ── Preview viewport & frame ── */
    .preview-viewport{
      overflow:auto;display:flex;align-items:flex-start;justify-content:center;
      background:#050816;transition:height 300ms ease;
      padding:12px;
    }
    .preview-frame{
      border-radius:10px;overflow:hidden;
      transform-origin:top center;
      transition:transform 300ms ease;
      box-shadow:0 8px 30px rgba(2,6,23,.6);
      border:1px solid rgba(255,255,255,.05);
      background:#fff;flex-shrink:0;
    }
    iframe{display:block;border:0;width:100%;height:100%;}

    /* ── Tamaños dispositivo ── */
    .device-mobile .preview-frame{width:360px;height:700px;}
    .device-desktop .preview-frame{width:960px;height:600px;}

    @media(max-width:1100px){
      .device-desktop .preview-frame{width:820px;height:520px;}
    }
    @media(max-width:900px){
      .device-desktop .preview-frame{width:680px;height:460px;}
    }
    @media(max-width:600px){
      .device-desktop .preview-frame{width:480px;height:380px;}
      .device-mobile  .preview-frame{width:300px;height:620px;}
    }

    /* ── Fullscreen ── */
    .is-fullscreen{
      position:fixed!important;top:50%!important;left:50%!important;
      transform:translate(-50%,-50%) scale(1)!important;
      width:95%!important;height:92%!important;z-index:2000;
      border-radius:18px!important;padding:18px;
      transition:all 380ms cubic-bezier(.22,.9,.3,1)!important;
    }

    /* ── Glass button ── */
    .glass-btn{
      background:linear-gradient(90deg,rgba(255,255,255,.03),rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.7);
      padding:4px 18px;border-radius:10px;
      color:#e6eef8;font-weight:100;font-size:.8rem;
      cursor:pointer;white-space:nowrap;transition:background .2s,color .2s;
    }

    .glass-btn:hover {
      background:#007aff;
      border: none;
    }

    /* ── Títulos ── */
    .titulosSterling-text{
      background:linear-gradient(170deg,#fff 0%, #3b4b5e 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      font-weight: 600;
    }

    /* ── Grid de proyectos (thumbs) ── */
    .projects-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
      gap:10px;
      width:100%;box-sizing:border-box;
    }
    .project-card{
      display:flex;flex-direction:column;align-items:center;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;padding:10px 8px;
      cursor:pointer;transition:border-color .2s,background .2s,transform .15s;
      text-align:center;
    }
    .project-card:hover{
      background:#007aff;
      border-color:rgba(255,255,255,.25);
      box-shadow: 0 0px 10px #007aff;
    }
    .project-card.active{
      border: none;
      background: #007aff;
      color: #000000;
    }
    .project-card-num{
      font-size:.65rem;color:#ffffff;margin-bottom:4px;font-weight:100;letter-spacing:.05em;
    }
    .project-card-name{
      font-size:.72rem;color:#d1d5db;font-weight:100;line-height:1.3;
    }
    .project-card.active .project-card-name{color:#fff;}

    /* ── Zoom range ── */
    input[type=range]{accent-color:#7c3aed;height:4px;cursor:pointer;}
    
    .textoDegradado {
      font-size: 28px;
    		font-weight: 300;
   	    text-decoration: none;
    		letter-spacing: -0.6px;
    		white-space: nowrap;
    		background: linear-gradient(170deg, #F5CC27 0%, #FF4800 45%, #F527B0 100%);
    		-webkit-background-clip: text;
    		background-clip: text;
    		color: transparent;
    }
  </style>
</head>
<body>
  <div class="showcase-wrap">

    <!-- NAVBAR -->
    <nav class="filter-menu mb-8">
      <a href="index.html">Inicio</a>
      <a href="index.html#sobremi">Sobre mi</a>
      <a href="index.html#estudio">Formación</a>
      <a href="index.html#experiencia">Experiencia</a>
      <a href="index.html#desarrollo">Desarrollos</a>
      <a href="index.html#competencia">Competencias</a>
      <a href="index.html#estrategia">Estrategias</a>
      <a href="index.html#contacto">Contacto</a>
      <div class="indicator"></div>
    </nav>

    <!-- HEADER -->
    <header class="text-center mb-8 mt-8">
      <h1 class="text-4xl sm:text-5xl lg:text-6xl mb-4 titulosSterling-text">Proyectos destacados</h1>
      <span class="text-2xl sm:text-3xl textoDegradado bg-clip-text text-transparent">Explora mis proyectos</span>
      <p class="text-base text-white mt-2">En vista previa o accede al sitio completo con un solo clic.</p>
    </header>

    <!-- CONTROLES -->
    <div class="controls-panel mb-4">
      <!-- Izquierda: dispositivo -->
      <div class="controls-left">
        <label class="text-sm text-white">Dispositivo:</label>
        <button id="btnMobile"  class="glass-btn"  aria-pressed="true">Mobile</button>
        <button id="btnDesktop" class="glass-btn"   aria-pressed="false">Desktop</button>
      </div>

      <!-- Derecha: zoom, rotar, fullscreen -->
      <div class="controls-right">
        <label class="text-sm text-white">Zoom:</label>
        <input id="zoom" type="range" min="50" max="150" value="100" style="width:100px;" />

        <label class="text-sm text-white">Rotar:</label>
        <button id="rotLeft"  class="glass-btn">⟲</button>
        <button id="rotRight" class="glass-btn">⟳</button>

        <button id="fullscreenBtn" class="glass-btn">Fullscreen</button>
        <button id="openOriginal"  class="glass-btn">Abrir ↗</button>
      </div>
    </div>

    <!-- DEVICE FRAME -->
    <div id="deviceFrame" class="device-frame device-mobile">
      <div class="frame-header">
        <div class="frame-dots">
          <span class="frame-dot dot-red"></span>
          <span class="frame-dot dot-yellow"></span>
          <span class="frame-dot dot-green"></span>
        </div>
        <div class="frame-header-label">Vista interactiva — navega en la página seleccionada</div>
        <div style="font-size:.7rem;color:#fff;flex-shrink:0;">Previsualización</div>
      </div>

      <div id="previewViewport" class="preview-viewport">
        <div id="previewFrame" class="preview-frame">
          <iframe id="miniIframe" src=""
            sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-modals allow-downloads"
            referrerpolicy="no-referrer"
            scrolling="yes"
            loading="lazy"
          ></iframe>
        </div>
      </div>
    </div>

    <!-- GRID DE PROYECTOS -->
    <div class="mt-6 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4">
      <p class="text-sm font-semibold text-white mb-3">Proyectos <span id="projectCount" class="text-white/40"></span></p>
      <div id="thumbList" class="projects-grid">
        <!-- generado por JS -->
      </div>
    </div>

  </div>

  <script>
    const SITES = [
      { id:'s1',  name:'Estadisticas de Luis Díaz', url:'https://santiago131440.github.io/SantiagoSterling/Dashboard2.html' },
      { id:'s2',  name:'Red Pericial', url:'https://santiago131440.github.io/SantiagoSterling/producto.html' },
      { id:'s3',  name:'Sterling Music Player', url:'https://santiago131440.github.io/SantiagoSterling/Music.html' },
      { id:'s4',  name:'Evaluación de Software', url:'https://santiago131440.github.io/SantiagoSterling/registro.html' },
      { id:'s5',  name:'Sterling Sum-ing', url:'https://santiago131440.github.io/SantiagoSterling/Dashboard3.html' },
      { id:'s6',  name:'Vortex Edit', url:'https://santiago131440.github.io/SantiagoSterling/Dashboard1.html' },
      { id:'s7',  name:'Restaurante la Kolina', url:'https://santiago131440.github.io/SantiagoSterling/Restaurante.html' },
      { id:'s8',  name:'ProyectoApp', url:'https://santiago131440.github.io/SantiagoSterling/proyectoApp.html' },
      { id:'s9',  name:'Red Pericial con video', url:'https://santiago131440.github.io/SantiagoSterling/EntornoPrueba.html' },
      { id:'s10', name:'Salarios minimos mundiales', url:'https://santiago131440.github.io/SantiagoSterling/Salarios.html' },
      { id:'s11', name:'Santiago Sterling World', url:'https://santiago131440.github.io/SantiagoSterling/Super Mario.html' },
      { id:'s12', name:'Indicadores de planta', url:'https://santiago131440.github.io/SantiagoSterling/Indicadores.HTML' },
      { id:'s13', name:'Sterling Music Studio', url:'https://santiago131440.github.io/SantiagoSterling/mix.html' },
      { id:'s14', name:'Aero Strike X', url:'https://santiago131440.github.io/SantiagoSterling/Buscaminas.html' },
    ];

    const deviceFrame   = document.getElementById('deviceFrame');
    const btnMobile     = document.getElementById('btnMobile');
    const btnDesktop    = document.getElementById('btnDesktop');
    const zoomInput     = document.getElementById('zoom');
    const rotLeft       = document.getElementById('rotLeft');
    const rotRight      = document.getElementById('rotRight');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const openOriginal  = document.getElementById('openOriginal');
    const thumbList     = document.getElementById('thumbList');
    const miniIframe    = document.getElementById('miniIframe');
    const previewFrame  = document.getElementById('previewFrame');
    const projectCount  = document.getElementById('projectCount');

    let currentSite   = SITES[0];
    let currentZoom   = 1.0;
    let currentRotate = 0;

    /* ── Build grid ── */
    function buildGrid(){
      thumbList.innerHTML = '';
      projectCount.textContent = `(${SITES.length})`;
      SITES.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'project-card';
        card.dataset.site = s.id;
        card.innerHTML = `
          <div class="project-card-num">${String(i+1).padStart(2,'0')}</div>
          <div class="project-card-name">${s.name}</div>
        `;
        card.addEventListener('click', () => selectSite(s.id));
        thumbList.appendChild(card);
      });
      setActiveCard(currentSite.id);
    }

    function setActiveCard(siteId){
      thumbList.querySelectorAll('.project-card').forEach(el => {
        el.classList.toggle('active', el.dataset.site === siteId);
      });
    }

    function selectSite(siteId){
      const site = SITES.find(x => x.id === siteId);
      if(!site) return;
      currentSite = site;
      miniIframe.src = site.url;
      setActiveCard(siteId);
    }

    /* ── Device toggles ── */
    btnMobile.addEventListener('click', () => {
      deviceFrame.classList.replace('device-desktop','device-mobile');
      btnMobile.setAttribute('aria-pressed','true');
      btnDesktop.setAttribute('aria-pressed','false');
    });
    btnDesktop.addEventListener('click', () => {
      deviceFrame.classList.replace('device-mobile','device-desktop');
      btnDesktop.setAttribute('aria-pressed','true');
      btnMobile.setAttribute('aria-pressed','false');
    });

    /* ── Zoom ── */
    zoomInput.addEventListener('input', e => {
      currentZoom = Number(e.target.value) / 100;
      applyTransform();
    });

    /* ── Rotate ── */
    rotLeft.addEventListener('click',  () => { currentRotate = (currentRotate - 90) % 360; applyTransform(); });
    rotRight.addEventListener('click', () => { currentRotate = (currentRotate + 90) % 360; applyTransform(); });

    function applyTransform(){
      previewFrame.style.transform = `scale(${currentZoom}) rotate(${currentRotate}deg)`;
      previewFrame.style.transformOrigin = 'top center';
    }

    /* ── Fullscreen ── */
    fullscreenBtn.addEventListener('click', async () => {
      try {
        if (deviceFrame.requestFullscreen) await deviceFrame.requestFullscreen();
        else if (deviceFrame.webkitRequestFullscreen) await deviceFrame.webkitRequestFullscreen();
        deviceFrame.classList.add('is-fullscreen');
      } catch(e){
        deviceFrame.classList.add('is-fullscreen');
      }
    });
    document.addEventListener('fullscreenchange', () => {
      deviceFrame.classList.toggle('is-fullscreen', !!document.fullscreenElement);
    });

    /* ── Open original ── */
    openOriginal.addEventListener('click', () => {
      window.open(currentSite.url, '_blank', 'noopener,noreferrer');
    });

    /* ── Keyboard ── */
    document.addEventListener('keydown', e => {
      if(e.key==='+' || e.key==='='){zoomInput.value=Math.min(150,+zoomInput.value+10);zoomInput.dispatchEvent(new Event('input'));}
      if(e.key==='-'){zoomInput.value=Math.max(50,+zoomInput.value-10);zoomInput.dispatchEvent(new Event('input'));}
      if(e.key.toLowerCase()==='r') rotRight.click();
      if(e.key.toLowerCase()==='l') rotLeft.click();
      if(e.key.toLowerCase()==='f') fullscreenBtn.click();
    });

    /* ── Double tap ── */
    let lastTap = 0;
    previewFrame.addEventListener('touchend', () => {
      const now = Date.now();
      if(now - lastTap < 300) openOriginal.click();
      lastTap = now;
    });

    /* ── Init ── */
    buildGrid();
    selectSite(currentSite.id);
    applyTransform();
  </script>
</body>
</html>
